<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Ticket - TripNest Travels</title>
    <link rel="stylesheet" href="output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white; color: black; }
            .ticket-card { border: 2px solid #ccc; shadow: none; }
        }
    </style>
</head>
<body class="bg-slate-950 p-4 sm:p-10 text-slate-200">

    <div class="max-w-3xl mx-auto">
        <div class="no-print flex flex-col sm:flex-row justify-between items-center gap-4 mb-8">
            <a href="my-bookings.html" class="text-blue-500 hover:text-blue-400 font-semibold flex items-center transition-colors group">
                <i class="fa-solid fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> 
                Back to Booking History
            </a>
            <button onclick="window.print()" class="bg-blue-600 px-8 py-3 min-w-[160px] rounded-xl text-white font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/30 flex items-center justify-center">
                <i class="fa-solid fa-print mr-2"></i> Print Ticket
            </button>
        </div>

        <div id="ticket-content" class="ticket-card bg-slate-900 rounded-3xl border-2 border-slate-800 overflow-hidden shadow-2xl">
            <!-- Content will be injected here -->
            <div class="p-20 text-center"><i class="fa-solid fa-spinner fa-spin text-4xl mb-4"></i><p>Generating your ticket...</p></div>
        </div>

        <div class="no-print mt-8 text-center text-sm">
            <a href="my-bookings.html" class="text-slate-500 hover:text-blue-500 transition-colors">
                Mistake in ticket? Return to Booking History
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const bookingId = urlParams.get('id');
            const container = document.getElementById('ticket-content');

            if (!bookingId) {
                container.innerHTML = '<div class="p-20 text-center text-red-500">Invalid Booking ID</div>';
                return;
            }

            try {
                // We fetch all bookings and find this one (simplified demo approach)
                const response = await fetch('/api/bookings');
                const data = await response.json();
                const booking = data.bookings.find(b => b._id === bookingId);

                if (!booking) throw new Error('Booking not found');

                container.innerHTML = `
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 text-white flex justify-between items-center">
                        <div>
                            <h2 class="text-3xl font-black italic tracking-tighter uppercase">Boarding Pass</h2>
                            <p class="text-white/80 text-sm font-bold mt-1">TripNest Travels &copy; 2026</p>
                        </div>
                        <i class="fa-solid fa-plane-tail text-5xl opacity-30"></i>
                    </div>

                    <div class="p-8 sm:p-12">
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-8 mb-12 border-b border-slate-800 pb-12">
                            <div>
                                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Passenger</p>
                                <p class="text-xl font-bold text-slate-50">${booking.travelerName}</p>
                            </div>
                            <div>
                                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Destination</p>
                                <p class="text-xl font-bold text-indigo-400">${booking.destination}</p>
                            </div>
                            <div>
                                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Travel Date</p>
                                <p class="text-xl font-bold text-slate-50">${booking.travelDate}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                            <div>
                                <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Travelers</p>
                                <p class="text-lg font-bold">${booking.travelersCount}</p>
                            </div>
                            <div>
                                <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Booking Ref</p>
                                <p class="text-sm font-mono">${booking._id.substr(-8).toUpperCase()}</p>
                            </div>
                            <div>
                                <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Status</p>
                                <p class="text-sm font-bold text-green-500 uppercase">${booking.bookingStatus}</p>
                            </div>
                            <div>
                                <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Class</p>
                                <p class="text-sm font-bold uppercase italic">Economy Plus</p>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-2xl flex flex-col items-center justify-center gap-4">
                            <i class="fa-solid fa-barcode text-6xl text-black"></i>
                            <p class="text-black text-[10px] font-mono tracking-[1em]">${booking.razorpayPaymentId || 'BOARDING_PASS'}</p>
                        </div>
                    </div>

                    <div class="bg-slate-950 border-t border-slate-800 p-6 flex justify-between items-center italic text-xs text-slate-500 font-medium">
                        <span>Please present this pass at the counter 2 hours before departure.</span>
                        <span class="font-bold text-indigo-400">THANK YOU FOR FLYING WITH US!</span>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = `<div class="p-20 text-center text-red-500">${err.message}</div>`;
            }
        });
    </script>
</body>
</html>
